<!-- templates/accounts/student_not_found.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Студент не найден</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-warning">
                        <h4>⚠️ Студент не найден</h4>
                    </div>
                    <div class="card-body">
                        <p>Уважаемый(ая) <strong>{{ user.username }}</strong>,</p>
                        <p>Ваш аккаунт не привязан к данным студента в системе.</p>
                        <p>Пожалуйста, обратитесь к администратору для решения этой проблемы.</p>
                        <hr>
                        <div class="d-grid gap-2">
                            <a href="{% url 'accounts:logout' %}" class="btn btn-secondary">Выйти</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
