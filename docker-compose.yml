services:
  database:
    build: ./database
    container_name: studportrait_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: studportrait
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - studportrait_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: studportrait_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - studportrait_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    container_name: studportrait_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=studportrait
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LLM_SERVICE_URL=http://llm:8001
      - LOCAL_DEV=false
      - IN_DOCKER=true 
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      llm:
        condition: service_started
    networks:
      - studportrait_network

  llm:
    build: ./llm
    container_name: studportrait_llm
    ports:
      - "8001:8001"
    volumes:
      # Монтирование папки с моделью
      - ./llm/llm_model:/app/llm_model:ro
      - cache:/app/cache
    environment:
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - studportrait_network

  frontend:
    build: ./frontend
    container_name: studportrait_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
      - REACT_APP_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - studportrait_network
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  redis_data:
  cache:
  static_volume:
  media_volume:

networks:
  studportrait_network:
    driver: bridge
